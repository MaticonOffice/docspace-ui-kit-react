name: CI

"on":
  push:
    branches: [main, develop, release/v*, hotfix/v*]
  pull_request:
    branches: [main, develop, release/v*, hotfix/v*]

env:
  NODE_VERSION: 24.x
  PNPM_VERSION: 10.28.0

jobs:
  lint-tsc-test:
    name: "Lint, TSC & Test"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lint
        run: pnpm lint

      - name: Run TypeScript
        run: pnpm tsc

      - name: Run Tests
        run: pnpm test

      - name: Checkout DocSpace client assets
        uses: actions/checkout@v4
        with:
          repository: MaticonOffice/DocSpace-client
          ref: 75df9afec4af2a43f27a48bf01625e38def2df9c
          path: .sources/DocSpace-client
          sparse-checkout: |
            public/locales
            public/css/fonts.css
            public/fonts
            public/images/icons
            packages/client/public/locales
          sparse-checkout-cone-mode: false

      - name: Run Production Build
        env:
          DOCSPACE_CLIENT_ROOT: ${{ github.workspace }}/.sources/DocSpace-client
        run: pnpm build
